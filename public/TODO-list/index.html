<!DOCTYPE html>
<head>
    <title>TODO</title>
    <link href="style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div class="box">
        <h2>TODO List</h2>
        <input id="todo-input" type="text" placeholder="Write some things you want to do and press `ADD`"></input>
        <button id="add-button" type="button">ADD</button>
        <ul id="todo-list">
            <li><input type="checkbox"></input>Task 1 <button class="remove-button">REMOVE</button></li>
            <li><input type="checkbox"></input>Task 2 <button class="remove-button">REMOVE</button></li>
        </ul>
    </div>
    <script src="./script.js"></script>
</body>
